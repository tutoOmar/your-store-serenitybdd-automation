serenity {
  project.name = "Your Store Automation"
  encoding = "UTF-8"
  report.encoding = "UTF-8"
  compress.filenames = true
  take.screenshots = FOR_EACH_ACTION
  use.unique.browser = true
  restart.browser.each.scenario = false
  timeout = 20000
}

headless.mode = false

webdriver {
  base.url = "http://opencart.abstracta.us/"
  driver = chrome
  autodownload = true
  
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-infobars",
        "--disable-extensions",
        "--remote-allow-origins=*",
        "test-type",
        "--no-sandbox",
        "--ignore-certificate-errors",
        "--disable-gpu",
        "--disable-dev-shm-usage",
        "--disable-web-security",
        "--disable-translate"
      ]
    }
  }
}